services:
  foodviseur:
    build:
      context: .
    image: foodviseur:latest
    container_name: foodviseur
    restart: unless-stopped
    # L'utilisateur qui exécute le conteneur.
    # Le dossier mappé sur /data doit appartenir à cet UID:GID sur l'hôte.
    # Exemple : user: "1000:1000"
    # Pour connaître votre UID:GID : lancez "id" dans votre terminal.
    # user: "1000:1000"
    ports:
      - "8000:8000"
    volumes:
      - foodviseur_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/foodviseur.db
      - LOG_LEVEL=info
      # User-Agent envoyé à Open Food Facts — format recommandé : AppName/Version (email@contact.com)
      - OFF_USER_AGENT=FoodViseur/1.0 (votre@email.com)
      # - RECENT_FOODS_LIMIT=8
      # ── Base OFF locale (optionnel) ──────────────────────────────────
      # Mettre OFF_LOCAL_ENABLED=true pour activer l'import local OFF
      # Premier démarrage : télécharge ~4 Go depuis Hugging Face
      # - OFF_LOCAL_ENABLED=false
      # Pays à importer (codes OFF séparés par virgule)
      # Exemples : en:france | en:france,en:belgium,en:switzerland
      # - OFF_COUNTRIES=en:france,en:belgium,en:switzerland
      # Fréquence de mise à jour : monthly | weekly | never
      # - OFF_UPDATE_INTERVAL=monthly
      # Mettre true pour ne JAMAIS re-télécharger au démarrage (mise à jour manuelle uniquement)
      # - OFF_SKIP_UPDATE=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/goals/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # ── Traefik labels (décommenter pour utiliser avec Traefik) ──
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.foodviseur.rule=Host(`foodviseur.yourdomain.com`)"
    #   - "traefik.http.routers.foodviseur.entrypoints=websecure"
    #   - "traefik.http.routers.foodviseur.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.foodviseur.loadbalancer.server.port=8000"
    #   - "traefik.http.routers.foodviseur.middlewares=foodviseur-auth"
    #   - "traefik.http.middlewares.foodviseur-auth.basicauth.users=user:$$apr1$$..."
    # networks:
    #   - traefik_proxy

volumes:
  foodviseur_data:
    driver: local

# networks:
